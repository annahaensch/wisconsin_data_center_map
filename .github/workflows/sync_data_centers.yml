name: Sync Data Centers from Google Sheets

on:
  workflow_dispatch:  # Run manually from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install geopy

      - name: Fetch and geocode data centers
        run: python geocode_data_centers.py

      - name: Update last_updated timestamp
        run: date -u +"%B %-d, %Y" > data/last_updated.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data_centers.csv data/last_updated.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync and geocode data_centers.csv from Google Sheets"
            git push origin main
          fi
